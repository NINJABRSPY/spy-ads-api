## native.ninjabrhub.online — AdPlexity Native Proxy (porta 3021)
## CANONICAL — salvar copia em .canonical para admin.py nao destruir
server {
    listen 80;
    listen [::]:80;
    server_name native.ninjabrhub.online;

    access_log /var/log/nginx/native.access.log;
    error_log /var/log/nginx/native.error.log;

    location = /health {
        proxy_pass http://127.0.0.1:3021/health;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    location / {
        return 200 'AdPlexity Native Proxy - OK';
        add_header Content-Type text/plain;
    }
}
