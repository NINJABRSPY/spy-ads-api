## intel.ninjabrhub.online — Daily Intel Service Proxy (porta 3020)
## CANONICAL — salvar copia em .canonical para admin.py nao destruir
## HTTP-only pra certbot validar. Certbot adiciona SSL automatico.

server {
    listen 80;
    listen [::]:80;
    server_name intel.ninjabrhub.online;

    access_log /var/log/nginx/intel.access.log;
    error_log /var/log/nginx/intel.error.log;

    location = /health {
        proxy_pass http://127.0.0.1:3020/health;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 45s;
        proxy_read_timeout 45s;
        proxy_buffering off;
    }

    location / {
        return 200 'Daily Intel Service Proxy - OK';
        add_header Content-Type text/plain;
    }
}
