## social1.ninjabrhub.online — Social1 Proxy (Playwright + FastAPI porta 3019)
##
## CANONICAL CONFIG — NAO DEIXAR admin.py SOBRESCREVER
## Backup: /etc/nginx/sites-available/social1.ninjabrhub.online.canonical
##
## Deploy manual:
##   cp nginx-social1.conf /etc/nginx/sites-available/social1.ninjabrhub.online
##   cp nginx-social1.conf /etc/nginx/sites-available/social1.ninjabrhub.online.canonical
##   ln -s ../sites-available/social1.ninjabrhub.online /etc/nginx/sites-enabled/
##   certbot --nginx -d social1.ninjabrhub.online
##   nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name social1.ninjabrhub.online;

    # Redirect HTTP to HTTPS (sera adicionado pelo certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name social1.ninjabrhub.online;

    # SSL sera preenchido pelo certbot
    # ssl_certificate /etc/letsencrypt/live/social1.ninjabrhub.online/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/social1.ninjabrhub.online/privkey.pem;

    # Logs separados pra debug
    access_log /var/log/nginx/social1.access.log;
    error_log /var/log/nginx/social1.error.log;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    # Health check
    location = /health {
        proxy_pass http://127.0.0.1:3019/health;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://127.0.0.1:3019;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos (Playwright pode demorar)
        proxy_connect_timeout 15s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;

        # Sem buffer pra respostas grandes
        proxy_buffering off;
    }

    # Tudo mais retorna 404
    location / {
        return 404 '{"error":"endpoint not found"}';
        add_header Content-Type application/json;
    }
}
